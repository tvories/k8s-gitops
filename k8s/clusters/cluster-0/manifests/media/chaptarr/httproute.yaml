---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: chaptarr
  namespace: media
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  hostnames:
    - "chaptarr.${SECRET_DOMAIN}"
  rules:
    - backendRefs:
        - name: chaptarr
          port: 8789
