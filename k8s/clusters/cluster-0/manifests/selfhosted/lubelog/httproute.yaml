---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: lubelog
  namespace: selfhosted
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  hostnames:
    - "lubelog.${SECRET_DOMAIN}"
  rules:
    - backendRefs:
        - name: lubelog
          port: 8080
